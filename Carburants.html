<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Stations carburant</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
  body { margin:0; font-family: Arial; }
  #map { height: 100vh; }

  #menu {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 1000;
    background: white;
    padding: 10px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
  }
</style>
</head>

<body>

<div id="menu">
  <label>Carburant :</label>
  <select id="fuelSelect">
    <option value="Gazole">Gazole</option>
    <option value="SP95">SP95</option>
    <option value="SP98">SP98</option>
    <option value="E10">E10</option>
    <option value="E85">E85</option>
    <option value="GPLc">GPL</option>
  </select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([46.6, 2.5], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

let markersLayer = L.layerGroup().addTo(map);

document.getElementById("fuelSelect").addEventListener("change", loadData);

loadData();

function loadData() {
  markersLayer.clearLayers();

  const selectedFuel = document.getElementById("fuelSelect").value;

  fetch('https://donnees.roulez-eco.fr/opendata/instantane')
    .then(res => res.text())
    .then(xmlText => {

      const parser = new DOMParser();
      const xml = parser.parseFromString(xmlText, "text/xml");

      const stations = xml.getElementsByTagName("pdv");

      for (let s of stations) {

        const lat = s.getAttribute("latitude") / 100000;
        const lon = s.getAttribute("longitude") / 100000;

        const prix = s.getElementsByTagName("prix");
        const ruptures = s.getElementsByTagName("rupture");

        let fuelPrice = null;
        let isRupture = false;

        // chercher prix
        for (let p of prix) {
          if (p.getAttribute("nom") === selectedFuel) {
            fuelPrice = p.getAttribute("valeur");
          }
        }

        // chercher rupture
        for (let r of ruptures) {
          if (r.getAttribute("nom") === selectedFuel || r.getAttribute("type") === selectedFuel) {
            isRupture = true;
          }
        }

        // afficher seulement si le carburant existe
        if (fuelPrice || isRupture) {

          let color = isRupture ? "red" : "green";

          let marker = L.circleMarker([lat, lon], {
            radius: 6,
            color: color
          });

          let popup = `
            <b>${selectedFuel}</b><br>
            Prix : ${fuelPrice ? fuelPrice + " €" : "N/A"}<br>
            État : ${isRupture ? "RUPTURE" : "Disponible"}
          `;

          marker.bindPopup(popup);

          markersLayer.addLayer(marker);
        }
      }
    });
}
</script>

</body>
</html>
