<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">
    <style>
        :root { --tmdb: #01b4e4; --fanart: #ffad00; --dark: #0a0a0a; --success: #27ae60; --error: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; }
        .wrapper { max-width: 1400px; margin: 0 auto; }
        
        /* API Status Bar */
        .api-status { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; font-size: 12px; font-weight: bold; }
        .status-item { padding: 5px 15px; border-radius: 20px; background: #1a1a1a; border: 1px solid #333; display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
        .dot.online { background: var(--success); box-shadow: 0 0 5px var(--success); }
        .dot.offline { background: var(--error); }

        .search-area { 
            background: #1a1a1a; padding: 15px; border-radius: 50px; 
            display: flex; gap: 10px; margin: 0 auto 40px auto; 
            max-width: 700px; border: 1px solid #333;
        }
        input { flex-grow: 1; padding: 12px 25px; border-radius: 30px; border: none; background: #2a2a2a; color: white; outline: none; }
        button { background: var(--tmdb); color: white; border: none; padding: 12px 30px; border-radius: 30px; cursor: pointer; font-weight: bold; }

        #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #333; position: relative; }
        .card img { width: 100%; height: auto; display: block; background: #111; cursor: pointer; transition: opacity 0.3s; }
        .card img:hover { opacity: 0.8; }
        
        /* Badges */
        .badge { position: absolute; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; z-index: 5; }
        .dim-source { top: 10px; right: 10px; background: rgba(0,0,0,0.85); color: var(--tmdb); border: 1px solid var(--tmdb); }
        .source-label { top: 10px; left: 10px; background: rgba(0,0,0,0.85); color: white; border: 1px solid #555; }
        .source-fanart { color: var(--fanart); border-color: var(--fanart); }

        .card-body { padding: 15px; text-align: center; }
        .movie-title { font-size: 0.85rem; height: 2.5em; overflow: hidden; margin-bottom: 10px; color: #ccc; }
        .btn-dl { display: block; width: 100%; background: var(--success); color: white; padding: 10px 0; border-radius: 6px; font-size: 0.75rem; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="api-status">
        <div class="status-item">TMDb: <span id="tmdb-dot" class="dot"></span></div>
        <div class="status-item">Fanart.tv: <span id="fanart-dot" class="dot"></span></div>
    </div>

    <div class="search-area">
        <input type="text" id="movieSearch" placeholder="Titre du film..." autofocus>
        <button onclick="fetchAllArt()">RECHERCHER</button>
    </div>
    <div id="gallery"></div>
</div>

<script>
    // --- CONFIGURATION ---
    const TMDB_KEY = '9c68a19b1c3204af5c50f6e96ed8dcce'; 
    const FANART_KEY = '0';

    // Diagnostic au démarrage
    window.onload = async () => {
        // Test TMDb
        try {
            const r = await fetch(`https://api.themoviedb.org/3/authentication?api_key=${TMDB_KEY}`);
            document.getElementById('tmdb-dot').className = r.ok ? 'dot online' : 'dot offline';
        } catch(e) { document.getElementById('tmdb-dot').className = 'dot offline'; }
        
        // Test Fanart (Simple check de clé via une requête vide)
        try {
            const r = await fetch(`https://webservice.fanart.tv/v3/movies/101?api_key=${FANART_KEY}`);
            document.getElementById('fanart-dot').className = r.ok ? 'dot online' : 'dot offline';
        } catch(e) { document.getElementById('fanart-dot').className = 'dot offline'; }
    };

    async function processAndDownload(url, filename, origW, origH) {
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.src = url;
        
        img.onload = function() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const targetWidth = 600;
            const targetHeight = Math.round(img.height * (targetWidth / img.width));
            
            canvas.width = targetWidth;
            canvas.height = targetHeight;
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(img, 0, 0, targetWidth, targetHeight);
            
            canvas.toBlob((blob) => {
                const a = document.createElement('a');
                a.href = window.URL.createObjectURL(blob);
                a.download = `${filename}_600x${targetHeight}.jpg`;
                a.click();
            }, 'image/jpeg', 0.92);
        };
    }

    async function fetchAllArt() {
        const query = document.getElementById('movieSearch').value;
        const gallery = document.getElementById('gallery');
        if (!query) return;
        gallery.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">Synchronisation des flux en cours...</p>';

        try {
            const searchRes = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}&language=fr-FR`);
            const searchData = await searchRes.json();
            gallery.innerHTML = '';

            for (const movie of searchData.results.slice(0, 12)) {
                if (!movie.poster_path) continue;

                // Récupération métadonnées TMDb
                const detailsRes = await fetch(`https://api.themoviedb.org/3/movie/${movie.id}/images?api_key=${TMDB_KEY}`);
                const detailsData = await detailsRes.json();
                const tmdbMeta = detailsData.posters[0] || { width: 2000, height: 3000 };

                // Tentative Fanart.tv
                let fanartUrl = null;
                try {
                    const faRes = await fetch(`https://webservice.fanart.tv/v3/movies/${movie.id}?api_key=${FANART_KEY}`);
                    const faData = await faRes.json();
                    if (faData.movieposter) fanartUrl = faData.movieposter[0].url;
                } catch(e) {}

                const finalUrl = fanartUrl || `https://image.tmdb.org/t/p/original${movie.poster_path}`;
                const previewUrl = `https://image.tmdb.org/t/p/w500${movie.poster_path}`;
                const sourceName = fanartUrl ? 'FANART.TV' : 'TMDB';
                
                // Calcul preview dimensions redimensionnées
                const targetH = Math.round(tmdbMeta.height * (600 / tmdbMeta.width));

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="badge source-label ${fanartUrl ? 'source-fanart' : ''}">${sourceName}</div>
                    <div class="badge dim-source">Orig: ${tmdbMeta.width}x${tmdbMeta.height}</div>
                    <img src="${previewUrl}" onclick="processAndDownload('${finalUrl}', '${movie.title}', ${tmdbMeta.width}, ${tmdbMeta.height})">
                    <div class="card-body">
                        <div class="movie-title">${movie.title}</div>
                        <button class="btn-dl" onclick="processAndDownload('${finalUrl}', '${movie.title}', ${tmdbMeta.width}, ${tmdbMeta.height})">
                            TÉLÉCHARGER (600 x ${targetH})
                        </button>
                    </div>
                `;
                gallery.appendChild(card);
            }
        } catch (err) {
            gallery.innerHTML = '<p style="color:var(--error); text-align:center; grid-column: 1/-1;">Erreur lors de la requête.</p>';
        }
    }

    document.getElementById('movieSearch').addEventListener('keypress', (e) => { if (e.key === 'Enter') fetchAllArt(); });
</script>

</body>
</html>
